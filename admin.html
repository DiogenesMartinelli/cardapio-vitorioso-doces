<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel · Vitorioso Doces</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Karla:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ font-family:'Karla',sans-serif; min-height:100vh; display:flex; align-items:center;
    justify-content:center; padding:20px; color:#3f1d10;
    background:linear-gradient(160deg,#faf2e3,#f4e8d4 60%,#ead9bd); }
  .login-card{ width:100%; max-width:380px; background:rgba(255,255,255,.7);
    border:1.5px solid rgba(255,255,255,.9); border-radius:22px; padding:36px 30px;
    box-shadow:0 24px 60px -20px rgba(63,29,16,.4); text-align:center; }
  .login-card img{ width:110px; margin:0 auto 10px; display:block; }
  .login-card h2{ font-family:'Fraunces',serif; font-weight:900; color:#5b2417; font-size:1.3rem; }
  .login-card p{ font-size:.82rem; color:#7c3a22; margin:6px 0 20px; font-weight:600; }
  .login-card input{ width:100%; font-family:inherit; font-size:.95rem; padding:12px 14px;
    border-radius:12px; border:1.5px solid rgba(124,58,34,.25); background:#fff;
    color:#3f1d10; margin-bottom:10px; }
  .login-card input:focus{ outline:2px solid #d3a05c; border-color:transparent; }
  .login-card button{ width:100%; border:none; cursor:pointer; font-family:inherit; font-weight:800;
    font-size:.95rem; padding:13px; border-radius:999px; color:#fff; margin-top:6px;
    background:linear-gradient(135deg,#b06a35,#7c3a22); transition:transform .2s; }
  .login-card button:hover{ transform:translateY(-2px); }
  .login-card button:disabled{ opacity:.6; cursor:wait; }
  .login-erro{ color:#b3261e; font-size:.82rem; font-weight:700; min-height:18px; margin-top:10px; }
</style>
</head>
<body>
<form class="login-card" id="f">
  <img src="logo.png" alt="Logo">
  <h2>Painel do Cardápio</h2>
  <p>Conteúdo protegido por criptografia AES-256.<br>Entre com seu e-mail e senha.</p>
  <input type="email" id="e" placeholder="E-mail" autocomplete="username" required>
  <input type="password" id="s" placeholder="Senha" autocomplete="current-password" required>
  <button type="submit" id="b">Entrar</button>
  <div class="login-erro" id="erro"></div>
</form>

function b2u(b64){ var bin = atob(b64); var u = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i); return u; }
function hexDe(buf){ return Array.prototype.map.call(new Uint8Array(buf), function(b){
  return b.toString(16).padStart(2,'0'); }).join(''); }
function deHex(h){ return new Uint8Array(h.match(/../g).map(function(x){ return parseInt(x,16); })); }

function decifra(bits){
  return crypto.subtle.importKey('raw', bits, 'AES-GCM', false, ['decrypt']).then(function(k){
    return crypto.subtle.decrypt({ name:'AES-GCM', iv:b2u(IV) }, k, b2u(CT));
  });
}
/* Troca o documento inteiro SEM usar document.write(): em navegadores como o
   Edge, document.write() chamado de dentro de uma Promise (fora do parsing
   síncrono da página) não limpa o documento — ele ACRESCENTA o novo HTML
   dentro do <body> antigo, deixando a tela de login e o painel sobrepostos.
   DOMParser + substituição manual de <head>/<body> é a forma robusta. */
function abre(buf, bitsHex){
  sessionStorage.setItem('vd-k', bitsHex);
  var html = new TextDecoder().decode(buf);
  var novo = new DOMParser().parseFromString(html, 'text/html');

  document.title = novo.title;
  while (document.head.firstChild) document.head.removeChild(document.head.firstChild);
  Array.prototype.forEach.call(novo.head.children, function(n){
    document.head.appendChild(document.importNode(n, true));
  });

  while (document.body.firstChild) document.body.removeChild(document.body.firstChild);
  Array.prototype.forEach.call(novo.body.children, function(n){
    if (n.tagName === 'SCRIPT') {
      var s = document.createElement('script');
      Array.prototype.forEach.call(n.attributes, function(a){ s.setAttribute(a.name, a.value); });
      s.textContent = n.textContent;
      document.body.appendChild(s); // recriar via createElement é o jeito padrão de fazer o script rodar de verdade
    } else {
      document.body.appendChild(document.importNode(n, true));
    }
  });
}
/* sessão já aberta nesta aba? entra direto */
var kh = sessionStorage.getItem('vd-k');
if (kh) {
  decifra(deHex(kh)).then(function(buf){ abre(buf, kh); })
    .catch(function(){ sessionStorage.removeItem('vd-k'); });
}
document.getElementById('f').addEventListener('submit', function(ev){
  ev.preventDefault();
  var bt = document.getElementById('b');
  bt.disabled = true; bt.textContent = 'Verificando…';
  var email = document.getElementById('e').value.trim().toLowerCase();
  var senha = document.getElementById('s').value;
  var enc = new TextEncoder();
  crypto.subtle.importKey('raw', enc.encode(email + '|' + senha), 'PBKDF2', false, ['deriveBits'])
    .then(function(chave){
      return crypto.subtle.deriveBits({ name:'PBKDF2', salt:b2u(SAL), iterations:ITER, hash:'SHA-256' }, chave, 256);
    })
    .then(function(bits){
      var hex = hexDe(bits);
      return decifra(new Uint8Array(bits)).then(function(buf){ abre(buf, hex); });
    })
    .catch(function(){
      document.getElementById('erro').textContent = 'E-mail ou senha incorretos.';
      bt.disabled = false; bt.textContent = 'Entrar';
    });
});
})();
